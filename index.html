            background-size: 200% 200%;
            animation: text-color-change 5s ease-in-out infinite, pulse-lite 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;

        @keyframes text-color-change {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }

        @keyframes pulse-lite {
          0%, 100% {
            transform: scale(1);
            opacity: 0.8;
          }
          50% {
            transform: scale(1.05);

          }
        }
    </style>

    <script>
        // --- SERVICE WORKER REGISTRATION ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('Service Worker registrato con successo.', reg))
                    .catch(err => console.log('Registrazione Service Worker fallita:', err));
            });
        }
        
        // --- VIOLATIONS DATABASE ---
        const violationsData = [
            {
                category: "Obblighi Fondamentali (Targa, Assicurazione, Casco)",
                items: [
                    { id: 'mancanza-targa', title: "Circolazione senza targa/contrassegno", article: "Art. 1, c. 75-vicies semel, L. 160/2019", keywords: "targa contrassegno", details: { description: "Circolazione con monopattino elettrico sprovvisto del contrassegno identificativo adesivo, personale e non rimovibile (targa), prodotto dalla Zecca dello Stato.", sanction: "Da € 100,00 a € 400,00", payment: "€ 100,00", accessory: "Nessuna.", notes: "Il contrassegno è personale, non cedibile e associato alla persona fisica o giuridica che lo richiede. Deve essere applicato sul parafango posteriore.", reportText: "Circolava alla guida di un monopattino elettrico sprovvisto del contrassegno identificativo (targa) previsto dalla normativa vigente." }},
                    { id: 'mancanza-assicurazione', title: "Circolazione senza assicurazione RC", article: "Art. 1, c. 75-vicies, L. 160/2019", keywords: "assicurazione rc", details: { description: "Circolazione con monopattino elettrico senza la copertura di un'assicurazione per la responsabilità civile verso terzi (RC).", sanction: "Da € 100,00 a € 400,00", payment: "€ 100,00", accessory: "Nessuna.", notes: "L'obbligo di assicurazione RC è esteso a tutti i monopattini di proprietà privata.", reportText: "Circolava alla guida di un monopattino elettrico sprovvisto della copertura assicurativa per la responsabilità civile verso terzi (RC), obbligatoria ai sensi della normativa vigente." }},
                    { id: 'mancanza-casco', title: "Conducente senza casco protettivo", article: "Art. 1, c. 75-septies, L. 160/2019", keywords: "casco protettivo", details: { description: "Conduzione di un monopattino elettrico senza indossare un idoneo casco protettivo conforme alle norme UNI EN 1078 o UNI EN 1080. L'obbligo è esteso a tutti i conducenti, senza distinzione di età.", sanction: "Da € 50,00 a € 200,00", payment: "€ 50,00", accessory: "Nessuna.", notes: "A differenza della normativa precedente, l'obbligo di casco è per tutti.", reportText: "Conducente di monopattino elettrico non indossava il casco protettivo obbligatorio." }}
                ]
            },
            {
                category: "Caratteristiche Tecniche del Veicolo",
                items: [
                    { id: 'mancanza-frecce-stop', title: "Veicolo senza indicatori di direzione/freno", article: "Art. 1, c. 75-sexies, L. 160/2019", keywords: "frecce stop luci", details: { description: "Circolazione con un monopattino sprovvisto di indicatori luminosi di svolta (frecce) e di indicatori luminosi di freno su entrambe le ruote.", sanction: "Da € 200,00 a € 800,00", payment: "€ 266,67", accessory: "Nessuna.", notes: "Tutti i monopattini in circolazione, anche se acquistati prima delle nuove norme, devono essere adeguati con questi dispositivi.", reportText: "Conduceva un monopattino sprovvisto di [indicatori luminosi di svolta / indicatori luminosi di frenata] su entrambe le ruote." }},
                    { id: 'caratteristiche-diverse', title: "Monopattino con caratteristiche non conformi", article: "Art. 1, c. 75-quater, L. 160/2019", keywords: "potenza sedile", details: { description: "Circolazione con monopattino avente caratteristiche tecniche o costruttive diverse da quelle ammesse. I casi più comuni sono: potenza motore superiore a 0,5 kW, presenza di un sedile la cui superficie superiore si trovi a 540 mm o più dal suolo, velocità massima per costruzione superiore a 20 km/h.", sanction: "Da € 200,00 a € 800,00", payment: "€ 266,67", accessory: "Confisca del mezzo. (Procedere con sequestro amministrativo ai fini della confisca ex Art. 213 CdS).", notes: "La violazione si applica anche a chi modifica il proprio monopattino per alterarne le prestazioni. Se il veicolo ha un motore termico o potenza superiore a 2 kW, si applicano le norme dei ciclomotori (es. targa, patente, casco da moto...).", reportText: "Conduceva un monopattino non avente le caratteristiche tecniche richieste. In particolare si accertava che il veicolo presentava [potenza superiore a 0,5 kW / un sedile con altezza superiore a 540mm / velocità per costruzione superiore a 20km/h]." } }
                ]
            },
            {
                category: "Norme di Circolazione e Comportamento",
                items: [
                    { id: 'eta-minima', title: "Conducente con età inferiore a 14 anni", article: "Art. 1, c. 75-septies, L. 160/2019", keywords: "eta minore", details: { description: "Conduzione di monopattino elettrico senza aver compiuto il 14° anno di età.", sanction: "Da € 40,00 a € 160,00", payment: "€ 40,00", accessory: "Nessuna.", notes: "La violazione si contesta all'esercente la potestà genitoriale o al tutore, che è obbligato in solido.", reportText: "Conduceva un monopattino pur non avendo compiuto 14 anni di età." } },
                    { id: 'strade-vietate', title: "Circolazione su aree non consentite", article: "Art. 1, c. 75-octies, L. 160/2019", keywords: "strada marciapiede extraurbana", details: { description: "Circolazione su strade urbane con limite di velocità superiore a 50 Km/h, su strade extraurbane (salvo eccezioni su piste ciclabili), su marciapiedi (salvo conduzione a mano) o contromano.", sanction: "Da € 100,00 a € 400,00", payment: "€ 100,00", accessory: "Nessuna.", notes: "La circolazione contromano è permessa solo nelle strade con doppio senso ciclabile.", reportText: "Conduceva un monopattino su [strada urbana con limite di velocità superiore a 50 Km/h / strada extraurbana / marciapiede / circolando contromano]." }},
                    { id: 'sosta-vietata', title: "Sosta irregolare", article: "Art. 1, c. 75-novies, L. 160/2019", keywords: "sosta parcheggio marciapiede", details: { description: "Sosta del monopattino sul marciapiede, al di fuori delle aree appositamente designate dal Comune.", sanction: "Da € 42,00 a € 173,00", payment: "€ 42,00", accessory: "Nessuna.", notes: "La sosta è consentita solo negli stalli per velocipedi, ciclomotori e motoveicoli, o in altre aree dedicate con apposita segnaletica.", reportText: "Lasciava in sosta il monopattino sul marciapiede, al di fuori delle aree consentite." }},
                    { id: 'limiti-velocita', title: "Superamento limiti di velocità specifici", article: "Art. 1, c. 75, L. 160/2019", keywords: "velocita", details: { description: "Superamento della velocità di 20 Km/h su carreggiata o di 6 Km/h nelle aree pedonali.", sanction: "Da € 42,00 a € 173,00", payment: "€ 42,00", accessory: "Nessuna.", notes: "Il limite massimo su strada è di 20 km/h, anche se il limite della strada è superiore (es. 50 km/h).", reportText: "Conduceva un monopattino ad una velocità superiore a [20 Km/h su carreggiata / 6 Km/h in area pedonale]." } },
                    { id: 'luci-notturne', title: "Circolazione notturna senza luci/catadiottri", article: "Art. 1, c. 75-sexies, L. 160/2019", keywords: "luci notte buio", details: { description: "Circolazione da mezz'ora dopo il tramonto o in condizioni di scarsa visibilità con monopattino sprovvisto, o con luci di posizione e catadiottri non funzionanti o mancanti.", sanction: "Da € 50,00 a € 200,00", payment: "€ 50,00", accessory: "Nessuna.", notes: "Il veicolo deve essere dotato di luce anteriore bianca o gialla, e di luce posteriore rossa e catadiottri rossi.", reportText: "Conduceva il monopattino, sebbene l'orario o le condizioni di visibilità lo richiedessero, senza avere in funzione le luci di posizione / senza i prescritti catadiottri." } },
                    { id: 'trasporto', title: "Trasporto di persone, oggetti o animali", article: "Art. 1, c. 75-undecies, L. 160/2019", keywords: "trasporto passeggero", details: { description: "Trasportare altre persone, oggetti o animali, trainare veicoli o farsi trainare.", sanction: "Da € 50,00 a € 200,00", payment: "€ 50,00", accessory: "Nessuna.", notes: "È vietato anche il trasporto di oggetti che sporgano lateralmente o longitudinalmente o che limitino la visibilità.", reportText: "Alla guida del monopattino trasportava altra persona (ovvero oggetti o animali) / trainava un veicolo / si faceva trainare." } },
                    { id: 'giubbotto', title: "Mancato uso del giubbotto/bretelle retroriflettenti", article: "Art. 1, c. 75-undecies, L. 160/2019", keywords: "giubbotto bretelle", details: { description: "Circolare da mezz'ora dopo il tramonto o in condizioni di scarsa visibilità senza indossare il giubbotto o le bretelle retroriflettenti ad alta visibilità (conformi al DM 07/01/2004).", sanction: "Da € 50,00 a € 200,00", payment: "€ 50,00", accessory: "Nessuna.", notes: "", reportText: "Circolava senza indossare il giubbotto o le bretelle retroriflettenti ad alta visibilità, sebbene le condizioni di orario o visibilità lo richiedessero." } },
                    { id: 'altre-norme', title: "Violazioni a norme generali del CdS", article: "Vari", keywords: "cellulare semaforo ebbrezza", details: { description: "Applicabilità delle norme di comportamento del Codice della Strada per quanto compatibili.", sanction: "Varia in base all'articolo violato.", payment: "Varia in base all'articolo violato.", accessory: "Varia in base all'articolo violato.", notes: "Esempi: uso del cellulare (Art. 173), passaggio con semaforo rosso (Art. 146), guida in stato di ebbrezza (Art. 186/186-bis), mancata precedenza.", reportText: "Alla guida del monopattino violava l'art. [numero articolo] del C.d.S. perché [descrizione comportamento]." } }
                ]
            }
        ];
        const allViolations = violationsData.flatMap(cat => cat.items);

        // --- WIZARD STRUCTURE ---
        const wizardSteps = {
            start: { question: "Inizia la procedura di accertamento", answers: [ { text: "Avanti", nextStep: "checkTarga" } ] },
            checkTarga: { question: "Il veicolo è dotato di targa?", answers: [ { text: "Sì", nextStep: "checkAssicurazione" }, { text: "No", collectViolationId: "mancanza-targa", nextStep: "checkAssicurazione" } ] },
            checkAssicurazione: { question: "Il conducente esibisce un certificato di assicurazione RC valido?", answers: [ { text: "Sì", nextStep: "checkCasco" }, { text: "No", collectViolationId: "mancanza-assicurazione", nextStep: "checkCasco" } ] },
            checkCasco: { question: "Il conducente indossa il casco protettivo?", answers: [ { text: "Sì", nextStep: "checkDriverAge" }, { text: "No", collectViolationId: "mancanza-casco", nextStep: "checkDriverAge" } ] },
            checkDriverAge: { question: "Qual è l'età del conducente?", answers: [ { text: "Minore di 14 anni", collectViolationId: "eta-minima", nextStep: "checkLuciFrecce" }, { text: "14 anni o più", nextStep: "checkLuciFrecce" } ] },
            checkLuciFrecce: { question: "Il veicolo è dotato di frecce e luci di stop funzionanti?", answers: [ { text: "Sì", nextStep: "checkVisibility" }, { text: "No", collectViolationId: "mancanza-frecce-stop", nextStep: "checkVisibility" } ] },
            checkVisibility: { question: "Quali sono le condizioni di visibilità?", answers: [ { text: "Diurna / Buona", nextStep: "checkLocation" }, { text: "Notturna / Scarsa", nextStep: "checkNightEquipment" } ] },
            checkNightEquipment: { question: "Indossa il giubbotto/bretelle retroriflettenti?", answers: [ { text: "Sì", nextStep: "checkLights" }, { text: "No", collectViolationId: "giubbotto", nextStep: "checkLights" } ] },
            checkLights: { question: "Ha le luci di posizione e i catadiottri funzionanti?", answers: [ { text: "Sì", nextStep: "checkLocation" }, { text: "No", collectViolationId: "luci-notturne", nextStep: "checkLocation" } ] },
            checkLocation: { question: "Dove sta circolando?", answers: [ { text: "Strada extraurbana o con limite > 50km/h", collectViolationId: "strade-vietate", nextStep: "checkSpeed" }, { text: "Marciapiede o Contromano", collectViolationId: "strade-vietate", nextStep: "checkSpeed" }, { text: "Area pedonale", nextStep: "checkSpeedPedestrian" }, { text: "Luogo consentito", nextStep: "checkSpeed" } ] },
            checkSpeed: { question: "Supera la velocità di 20 km/h?", answers: [ { text: "Sì", collectViolationId: "limiti-velocita", nextStep: "checkBehavior" }, { text: "No", nextStep: "checkBehavior" } ] },
            checkSpeedPedestrian: { question: "In area pedonale, supera la velocità di 6 km/h?", answers: [ { text: "Sì", collectViolationId: "limiti-velocita", nextStep: "checkBehavior" }, { text: "No", nextStep: "checkBehavior" } ] },
            checkBehavior: { question: "Trasporta altre persone/oggetti o si fa trainare?", answers: [ { text: "Sì", collectViolationId: "trasporto", nextStep: "checkSosta" }, { text: "No", nextStep: "checkSosta" } ] },
            checkSosta: { question: "Il controllo riguarda la sosta del veicolo?", answers: [ { text: "Sì, sosta su marciapiede", collectViolationId: "sosta-vietata", nextStep: "checkBehaviorCDS" }, { text: "No, controllo su circolazione", nextStep: "checkBehaviorCDS" } ] },
            checkBehaviorCDS: { question: "Ha commesso altre violazioni al CdS (cellulare, semaforo, etc)?", answers: [ { text: "Sì", collectViolationId: "altre-norme", nextStep: "checkTechAnomalies" }, { text: "No", nextStep: "checkTechAnomalies" } ] },
            checkTechAnomalies: { question: "Il veicolo presenta anomalie tecniche (potenza, sedile)?", answers: [ { text: "Sì", collectViolationId: "caratteristiche-diverse", nextStep: "summary" }, { text: "No, veicolo conforme", nextStep: "summary" } ] },
            summary: { question: "Accertamento completato.", isEnd: true, answers: [{ text: "Mostra Riepilogo Sanzioni" }] }
        };

        // --- DOM REFERENCES ---
        const mainContent = document.getElementById('main-content');
        const backBtn = document.getElementById('back-btn');
        const resetBtn = document.getElementById('reset-btn');
        const searchInput = document.getElementById('search-input');
        const modal = document.getElementById('result-modal');
        const modalContent = document.getElementById('result-modal-content');
        const modalTitle = document.getElementById('modal-title');
        const modalBody = document.getElementById('modal-body');
        const modalFooter = document.getElementById('modal-footer');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

        let historyStack = [];
        let collectedViolations = new Set();
        
        // --- THEME ---
        const applyTheme = () => {
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                themeToggleLightIcon.classList.remove('hidden');
                themeToggleDarkIcon.classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                themeToggleLightIcon.classList.add('hidden');
                themeToggleDarkIcon.classList.remove('hidden');
            }
        };

        themeToggleBtn.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            applyTheme();
        });


        // --- RENDER FUNCTIONS ---
        const renderStep = (stepId) => {
            historyStack.push(stepId);
            const step = wizardSteps[stepId];
            mainContent.innerHTML = ''; 
            
            const questionEl = document.createElement('h2');
            questionEl.className = 'text-xl md:text-2xl font-bold text-slate-800 dark:text-slate-100 mb-6';
            questionEl.textContent = step.question;
            mainContent.appendChild(questionEl);

            const answersContainer = document.createElement('div');
            answersContainer.className = step.isEnd ? 'w-full' : 'w-full grid grid-cols-1 md:grid-cols-2 gap-4';
            
            step.answers.forEach(answer => {
                const button = document.createElement('button');
                button.className = 'w-full text-center wizard-button font-semibold p-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sky-500 transition';
                button.innerHTML = `<span class="text-lg">${answer.text}</span>`;
                
                if (step.isEnd) {
                    button.dataset.action = 'showSummary';
                    button.classList.add('bg-green-600', 'text-white', 'hover:bg-green-700');
                } else {
                    button.dataset.nextStep = answer.nextStep;
                    if (answer.collectViolationId) {
                        button.dataset.collectViolationId = answer.collectViolationId;
                    }
                    button.classList.add('bg-sky-100', 'text-sky-800', 'hover:bg-sky-200', 'dark:bg-sky-900', 'dark:text-sky-200', 'dark:hover:bg-sky-800');
                }
                answersContainer.appendChild(button);
            });
            mainContent.appendChild(answersContainer);
            backBtn.classList.toggle('hidden', historyStack.length <= 1);
        };
        
        const renderViolations = (violations) => {
            mainContent.innerHTML = '';
            const container = document.createElement('div');
            container.className = 'w-full space-y-4 text-left';
            if (violations.length === 0) {
                 container.innerHTML = `<p class="text-slate-500 dark:text-slate-400 text-center">Nessuna violazione trovata.</p>`;
            } else {
                violations.forEach(violation => {
                    const el = document.createElement('div');
                    el.className = 'p-4 border border-slate-200 dark:border-slate-700 rounded-lg bg-slate-50 dark:bg-slate-900/50 cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-700 transition';
                    el.innerHTML = `<h3 class="font-bold text-lg text-slate-800 dark:text-slate-100">${violation.title}</h3><p class="text-sm text-slate-500 dark:text-slate-400">${violation.article}</p>`;
                    el.addEventListener('click', () => {
                        collectedViolations.add(violation.id);
                        showModal();
                    });
                    container.appendChild(el);
                });
            }
            mainContent.appendChild(container);
            backBtn.classList.remove('hidden');
        };

        const showModal = () => {
            modalBody.innerHTML = '';
            modalFooter.innerHTML = '';

            let totalPayment = 0;
            let reportTextToCopy = [];
            
            if (collectedViolations.size === 0) {
                 modalBody.innerHTML = `<div class="text-center py-8"><svg class="w-16 h-16 text-green-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><h3 class="text-xl font-bold text-slate-800 dark:text-slate-100">Nessuna infrazione rilevata.</h3><p class="text-slate-500 dark:text-slate-400 mt-2">In base alla selezione, non risultano violazioni.</p></div>`;
            } else {
                const violationsToShow = allViolations.filter(v => collectedViolations.has(v.id));
                const violationsContainer = document.createElement('div');
                violationsContainer.className = 'space-y-6';

                violationsToShow.forEach(violation => {
                    const paymentValue = parseFloat(violation.details.payment.replace('€', '').replace(',', '.'));
                    if (!isNaN(paymentValue)) {
                        totalPayment += paymentValue;
                    }
                    reportTextToCopy.push(`- ${violation.title} (Art. ${violation.article}): ${violation.details.reportText}`);

                    const el = document.createElement('div');
                    el.className = 'p-4 border border-slate-200 dark:border-slate-700 rounded-lg bg-slate-50 dark:bg-slate-900/50';
                    const renderDetail = (label, value, colorClass = 'text-slate-900 dark:text-slate-200') => {
                        if (!value) return '';
                        return `<div class="mt-2"><p class="text-xs font-semibold text-sky-700 dark:text-sky-400">${label}</p><p class="text-sm ${colorClass}">${value.replace(/\n/g, '<br>')}</p></div>`;
                    };
                    el.innerHTML = `
                        <h3 class="font-bold text-lg text-slate-800 dark:text-slate-100">${violation.title}</h3>
                        ${renderDetail('Norma Violata', violation.article)}
                        ${renderDetail('Sanzione Edittale', violation.details.sanction, 'text-red-600 dark:text-red-500 font-semibold')}
                        ${renderDetail('Pagamento in Misura Ridotta', violation.details.payment, 'text-green-700 dark:text-green-500 font-semibold')}
                        ${renderDetail('Sanzioni Accessorie', violation.details.accessory)}
                        ${violation.details.notes ? `<div class="mt-2 pt-2 border-t border-dashed border-slate-300 dark:border-slate-600"><p class="text-xs font-semibold text-amber-700 dark:text-amber-500">Note Operative</p><p class="text-sm text-slate-600 dark:text-slate-300">${violation.details.notes}</p></div>` : ''}
                        ${violation.details.reportText ? `
                            <div class="mt-3 pt-3 border-t border-slate-200 dark:border-slate-600">
                                <p class="text-sm font-semibold text-gray-700 dark:text-gray-300 flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z" /><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd" /></svg>
                                    Dicitura per il verbale
                                </p>
                                <p class="text-sm text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 p-2 rounded-md mt-1 font-mono">${violation.details.reportText}</p>
                            </div>
                        ` : ''}
                    `;
                    violationsContainer.appendChild(el);
                });
                modalBody.appendChild(violationsContainer);
                
                // Footer content
                modalFooter.innerHTML = `
                    <div class="text-right mb-2">
                        <span class="text-sm text-slate-600 dark:text-slate-300">Totale P.M.R.:</span>
                        <span class="font-bold text-xl text-green-700 dark:text-green-500">€ ${totalPayment.toFixed(2).replace('.', ',')}</span>
                    </div>
                    <button id="copy-btn" class="w-full bg-slate-600 text-white font-bold py-3 px-5 rounded-lg hover:bg-slate-700 transition dark:bg-slate-600 dark:hover:bg-slate-500">
                        Copia Riepilogo per Verbale
                    </button>
                `;
                document.getElementById('copy-btn').addEventListener('click', (e) => {
                    const button = e.currentTarget;
                    const textToCopy = `Accertate le seguenti violazioni:\n${reportTextToCopy.join('\n')}\n\nImporto totale P.M.R.: € ${totalPayment.toFixed(2).replace('.', ',')}`;
                    navigator.clipboard.writeText(textToCopy).then(() => {
                        const originalText = button.textContent;
                        button.textContent = 'Copiato! ✔';
                        button.classList.add('bg-green-600', 'dark:bg-green-600');
                        setTimeout(() => {
                           button.textContent = originalText;
                           button.classList.remove('bg-green-600', 'dark:bg-green-600');
                        }, 2000);
                    });
                });
            }
            
            modal.classList.remove('hidden');
            modalContent.classList.add('modal-enter-active');
        };

        const hideModal = () => {
            modalContent.classList.add('modal-leave-active');
            setTimeout(() => {
                modal.classList.add('hidden');
                modalContent.classList.remove('modal-enter-active', 'modal-leave-active');
            }, 200);
        };

        const startWizard = () => {
            searchInput.value = '';
            historyStack = [];
            collectedViolations.clear();
            renderStep('start');
        };
        
        // --- EVENT LISTENERS ---
        mainContent.addEventListener('click', (e) => {
            const button = e.target.closest('button');
            if (!button) return;
            const { nextStep, collectViolationId, action } = button.dataset;
            
            if (collectViolationId) {
                collectedViolations.add(collectViolationId);
            }
            if (nextStep) {
                renderStep(nextStep);
            }
            if (action === 'showSummary') {
                showModal();
            }
        });
        
        searchInput.addEventListener('input', () => {
            const query = searchInput.value.toLowerCase().trim();
            if (query.length > 2) {
                 const results = allViolations.filter(v => 
                    v.title.toLowerCase().includes(query) || 
                    v.keywords.toLowerCase().includes(query)
                 );
                 renderViolations(results);
            } else if (query.length === 0) {
                 startWizard();
            }
        });

        backBtn.addEventListener('click', () => {
            if (searchInput.value.length > 0) {
                startWizard();
                return;
            }
            if (historyStack.length > 1) {
                historyStack.pop(); 
                const previousStepId = historyStack.pop();
                renderStep(previousStepId);
            }
        });

        resetBtn.addEventListener('click', startWizard);
        closeModalBtn.addEventListener('click', hideModal);
        modal.addEventListener('click', (e) => { if (e.target === modal) hideModal(); });

        // Initial call
        document.addEventListener('DOMContentLoaded', () => {
            applyTheme();
            startWizard();
        });
    </script>
</body>
</html>
